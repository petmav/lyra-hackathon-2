name: ci

on:
  push:
  pull_request:

jobs:
  smoke:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: praetor
          POSTGRES_PASSWORD: praetor
          POSTGRES_DB: praetor
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U praetor -d praetor"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Install API test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e "apps/api[dev]"

      - name: Install workflow test dependencies
        run: python -m pip install -e apps/workflow pytest

      - name: API tests
        env:
          PG_DSN: postgresql+asyncpg://praetor:praetor@localhost:5432/praetor
          REDIS_URL: redis://localhost:6379/0
          PRAETOR_RUN_DB_TESTS: "1"
        run: |
          cd apps/api
          python -m alembic upgrade head
          python -m pytest

      - name: Workflow tests
        run: cd apps/workflow && python -m pytest

      - name: Web build
        run: |
          cd apps/web
          npm ci
          npm run build
