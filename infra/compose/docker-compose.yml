services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: praetor
      POSTGRES_PASSWORD: praetor
      POSTGRES_DB: praetor
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U praetor -d praetor"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: praetor
      MINIO_ROOT_PASSWORD: praetor-secret
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 10

  opa:
    image: openpolicyagent/opa:latest
    command: ["run", "--server", "--addr", "0.0.0.0:8181"]
    ports:
      - "8181:8181"
    healthcheck:
      test: ["CMD", "/opa", "eval", "1"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ../../apps/api
    env_file:
      - ${PRAETOR_ENV_FILE:-.env.production.example}
    environment:
      PG_DSN: postgresql+asyncpg://praetor:praetor@postgres:5432/praetor
      REDIS_URL: redis://redis:6379/0
      S3_ENDPOINT: http://minio:9000
      OPA_URL: http://opa:8181
      SANDBOX_ORCHESTRATOR_URL: http://sandbox:8700
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      opa:
        condition: service_healthy

  workflow:
    build:
      context: ../../apps/workflow
    env_file:
      - ${PRAETOR_ENV_FILE:-.env.production.example}
    environment:
      PRAETOR_API_BASE: http://api:8000
      DEV_BEARER: dev
      PRAETOR_WORKFLOW_WORKER_BATCH_SIZE: 4
      PRAETOR_WORKFLOW_WORKER_INTERVAL_SECONDS: 2
      PRAETOR_WORKFLOW_STEP_LEASE_SECONDS: 300
      PRAETOR_EVIDENCE_SWEEP_EVERY_TICKS: 15
    depends_on:
      redis:
        condition: service_healthy
      api:
        condition: service_started

  sandbox:
    build:
      context: ../../apps/sandbox
    env_file:
      - ${PRAETOR_ENV_FILE:-.env.production.example}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8700/health', timeout=2).read()"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - default
      - praetor-mocks

  mcp-github-stub:
    build:
      context: ../../packages/hooks/mcp_client/stubs
    environment:
      MCP_STUB_NAME: github
      MCP_STUB_TOKEN: ${MCP_GITHUB_TOKEN:-}
    networks:
      - default
      - praetor-mocks

  mcp-slack-stub:
    build:
      context: ../../packages/hooks/mcp_client/stubs
    environment:
      MCP_STUB_NAME: slack
      MCP_STUB_TOKEN: ${MCP_SLACK_TOKEN:-}
    networks:
      - default
      - praetor-mocks

  mcp-localfiles-stub:
    build:
      context: ../../packages/hooks/mcp_client/stubs
    environment:
      MCP_STUB_NAME: local-files
      MCP_STUB_TOKEN: ${MCP_LOCALFILES_TOKEN:-}
    networks:
      - default
      - praetor-mocks

  web:
    build:
      context: ../../apps/web
      args:
        NEXT_PUBLIC_API_BASE: http://localhost:8000
        NEXT_PUBLIC_DEV_BEARER: dev
        NEXT_PUBLIC_DATA_SOURCE: ${NEXT_PUBLIC_DATA_SOURCE:-api}
        NEXT_PUBLIC_PRAETOR_DATA_MODE: ${NEXT_PUBLIC_PRAETOR_DATA_MODE:-production}
    environment:
      NEXT_PUBLIC_API_BASE: http://localhost:8000
      NEXT_PUBLIC_DEV_BEARER: dev
      NEXT_PUBLIC_DATA_SOURCE: ${NEXT_PUBLIC_DATA_SOURCE:-api}
      NEXT_PUBLIC_PRAETOR_DATA_MODE: ${NEXT_PUBLIC_PRAETOR_DATA_MODE:-production}
      INTERNAL_API_BASE: http://api:8000
    ports:
      - "3000:3000"
    depends_on:
      - api

volumes:
  pg_data:
  minio_data:

networks:
  default:
    name: praetor-net
  praetor-mocks:
    name: praetor-mocks
